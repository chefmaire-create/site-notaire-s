<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Étude Notariale Dupont & Associés — Connexion</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(160deg,#0d0d1a 0%,#1a1a2e 60%,#0d0d1a 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;}
.header{text-align:center;margin-bottom:30px;}
.logo{display:flex;align-items:center;gap:14px;justify-content:center;margin-bottom:10px;}
.logo-ico{width:62px;height:62px;background:linear-gradient(135deg,#8B6914,#C9A84C);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#fff;box-shadow:0 4px 20px rgba(139,105,20,0.45);}
.logo-t{font-size:1.1rem;font-weight:800;color:#fff;letter-spacing:.08em;display:block;}
.logo-s{font-size:.62rem;color:#C9A84C;letter-spacing:.2em;text-transform:uppercase;display:block;margin-top:2px;}
.tagline{color:rgba(255,255,255,0.35);font-size:.78rem;letter-spacing:.05em;}
.card{background:#fff;border-radius:18px;padding:30px 26px;width:100%;max-width:390px;box-shadow:0 20px 60px rgba(0,0,0,0.4);border-top:4px solid #C9A84C;}
.card-title{font-size:.8rem;font-weight:700;color:#8B6914;margin-bottom:20px;padding-bottom:11px;border-bottom:1px solid #dde2ec;letter-spacing:.08em;display:flex;align-items:center;gap:8px;}
.err{display:none;background:#fdecea;border:1px solid #f5c6c2;border-radius:9px;padding:9px 12px;margin-bottom:13px;font-size:.81rem;color:#c0392b;align-items:center;gap:7px;}
.err.show{display:flex;}
.fl{margin-bottom:16px;}
.fl label{display:block;font-size:.69rem;font-weight:700;color:#8a94a6;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.iw{position:relative;}
.iw i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#8a94a6;font-size:.83rem;pointer-events:none;}
.iw input{width:100%;padding:11px 42px 11px 36px;border:1.5px solid #dde2ec;border-radius:9px;font-size:.88rem;color:#1a1f36;background:#fafbff;outline:none;transition:.2s;font-family:inherit;}
.iw input:focus{border-color:#C9A84C;box-shadow:0 0 0 3px rgba(201,168,76,0.1);}
.iw input::placeholder{color:#c0c8da;}
.eye{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:#eef1f8;border:1.5px solid #dde2ec;border-radius:6px;width:28px;height:25px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#8a94a6;font-size:.8rem;transition:.2s;}
.eye:hover{background:#C9A84C;color:#fff;border-color:#C9A84C;}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#8B6914,#C9A84C);color:#fff;border:none;border-radius:9px;font-size:.91rem;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 4px 14px rgba(139,105,20,0.28);}
.btn:hover{transform:translateY(-1px);}
.footer{margin-top:22px;text-align:center;}
.badges{display:flex;gap:14px;justify-content:center;margin-bottom:8px;}
.bdg{font-size:.7rem;color:rgba(255,255,255,0.35);display:flex;align-items:center;gap:5px;}
.bdg i{color:#C9A84C;}
.footer p{font-size:.67rem;color:rgba(255,255,255,0.2);}
.spin-bg{position:fixed;inset:0;background:rgba(10,10,20,0.5);z-index:999;display:none;align-items:center;justify-content:center;}
.spin-bg.on{display:flex;}
.spin{width:42px;height:42px;border:4px solid rgba(255,255,255,0.2);border-top-color:#C9A84C;border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <div class="logo-ico"><i class="fas fa-balance-scale"></i></div>
    <div>
      <span class="logo-t">Mé DUPONT & ASSOCIÉS</span>
      <span class="logo-s">NOTAIRES ASSOCIÉS — PARIS</span>
    </div>
  </div>
  <p class="tagline">Espace sécurisé · Actes authentiques · Officiel</p>
</div>
<div class="card">
  <div class="card-title"><i class="fas fa-lock"></i> ACCÈS RÉSERVÉ</div>
  <div class="err" id="err"><i class="fas fa-exclamation-triangle"></i><span>Identifiant ou mot de passe incorrect.</span></div>
  <div class="fl">
    <label>Identifiant</label>
    <div class="iw"><i class="fas fa-user"></i><input type="text" id="u" placeholder="Votre identifiant" required></div>
  </div>
  <div class="fl">
    <label>Mot de passe</label>
    <div class="iw"><i class="fas fa-key"></i><input type="password" id="p" placeholder="••••••••" required><button type="button" class="eye" onclick="tp()"><i class="fas fa-eye" id="ei"></i></button></div>
  </div>
  <button class="btn" onclick="login()"><i class="fas fa-sign-in-alt"></i> SE CONNECTER</button>
</div>
<div class="footer">
  <div class="badges">
    <span class="bdg"><i class="fas fa-shield-alt"></i> SSL</span>
    <span class="bdg"><i class="fas fa-gavel"></i> Officiel</span>
    <span class="bdg"><i class="fas fa-lock"></i> Chiffré</span>
  </div>
  <p>© 2024 Étude Notariale Dupont & Associés — Accès strictement réservé</p>
</div>
<div class="spin-bg" id="sp"><div class="spin"></div></div>
<script>
function login(){
  var u=document.getElementById('u').value.trim();
  var p=document.getElementById('p').value;
  document.getElementById('err').classList.remove('show');
  document.getElementById('sp').classList.add('on');
  setTimeout(function(){
    if(u==='DjanIsFake'&&p==='44454241'){window.location.href='dashboard.html';}
    else{document.getElementById('sp').classList.remove('on');document.getElementById('err').classList.add('show');document.getElementById('p').value='';}
  },900);
}
function tp(){var i=document.getElementById('p'),ic=document.getElementById('ei');i.type=i.type==='password'?'text':'password';ic.className=i.type==='password'?'fas fa-eye':'fas fa-eye-slash';}
document.getElementById('p').addEventListener('keypress',function(e){if(e.key==='Enter')login();});
document.getElementById('u').addEventListener('keypress',function(e){if(e.key==='Enter')login();});
</script>
</body>
</html>
