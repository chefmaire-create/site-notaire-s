<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Étude Notariale Dupont & Associés</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-page">
        <div class="login-header">
            <div class="notaire-logo">
                <div class="logo-icon"><i class="fas fa-balance-scale"></i></div>
                <div class="logo-text">
                    <span class="logo-title">Mé DUPONT & ASSOCIÉS</span>
                    <span class="logo-sub">NOTAIRES ASSOCIÉS</span>
                </div>
            </div>
            <p class="login-tagline">Espace sécurisé — Actes authentiques</p>
        </div>
        <div class="login-card">
            <h2 class="login-card-title"><i class="fas fa-lock"></i> ACCÈS RÉSERVÉ</h2>
            <div class="login-error" id="login-error">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="error-msg">Identifiant ou mot de passe incorrect.</span>
            </div>
            <form onsubmit="doLogin(event)">
                <div class="field">
                    <label>Identifiant</label>
                    <div class="input-wrap">
                        <i class="fas fa-user ico-left"></i>
                        <input type="text" id="input-user" placeholder="Votre identifiant" required>
                    </div>
                </div>
                <div class="field">
                    <label>Mot de passe</label>
                    <div class="input-wrap">
                        <i class="fas fa-key ico-left"></i>
                        <input type="password" id="input-pass" placeholder="••••••••" required>
                        <button type="button" class="btn-eye" onclick="togglePass()"><i class="fas fa-eye" id="eye-icon"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> SE CONNECTER</button>
            </form>
        </div>
        <div class="login-footer">
            <div class="badges">
                <span class="badge"><i class="fas fa-shield-alt"></i> SSL</span>
                <span class="badge"><i class="fas fa-lock"></i> Chiffré</span>
                <span class="badge"><i class="fas fa-gavel"></i> Officiel</span>
            </div>
            <p>© 2024 Étude Notariale Dupont & Associés — Accès strictement réservé</p>
        </div>
    </div>
    <div class="spinner-overlay" id="spinner"><div class="spinner"></div></div>
    <script>
        function doLogin(e) {
            e.preventDefault();
            var u = document.getElementById('input-user').value.trim();
            var p = document.getElementById('input-pass').value;
            document.getElementById('login-error').classList.remove('show');
            document.getElementById('spinner').classList.add('show');
            setTimeout(function() {
                if (u === 'DjanIsFake' && p === '44454241') {
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('spinner').classList.remove('show');
                    document.getElementById('error-msg').textContent = 'Identifiant ou mot de passe incorrect.';
                    document.getElementById('login-error').classList.add('show');
                    document.getElementById('input-pass').value = '';
                }
            }, 900);
        }
        function togglePass() {
            var i = document.getElementById('input-pass'), ic = document.getElementById('eye-icon');
            i.type = i.type === 'password' ? 'text' : 'password';
            ic.className = i.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
        }
    </script>
</body>
</html>
