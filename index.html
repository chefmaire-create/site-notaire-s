<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Étude Notariale Dupont & Associés — Connexion</title>
    <style>:root {
    --gold:#8B6914; --gold2:#C9A84C; --gold3:#F0D080; --gold-light:#faf5e4;
    --dark:#1a1a2e; --dark2:#16213e;
    --white:#fff; --gray:#8a94a6; --border:#dde2ec; --text:#1a1f36; --bg:#f5f3ee;
    --red:#c0392b; --green:#27ae60; --blue:#2980b9;
    --sidebar-w:260px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Georgia,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── LOGIN ── */
.login-body{background:linear-gradient(160deg,#0d0d1a 0%,#1a1a2e 60%,#0d0d1a 100%);}
.login-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;}
.login-header{text-align:center;margin-bottom:32px;}
.notaire-logo{display:flex;align-items:center;gap:14px;justify-content:center;margin-bottom:10px;}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:#fff;box-shadow:0 4px 20px rgba(139,105,20,0.45);}
.logo-text .logo-title{font-size:1.15rem;font-weight:800;color:#fff;letter-spacing:.08em;display:block;}
.logo-text .logo-sub{font-size:.62rem;color:var(--gold2);letter-spacing:.2em;text-transform:uppercase;display:block;}
.login-tagline{color:rgba(255,255,255,0.38);font-size:.78rem;letter-spacing:.05em;}
.login-card{background:#fff;border-radius:20px;padding:32px 26px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.4);border-top:4px solid var(--gold2);}
.login-card-title{font-size:.82rem;font-weight:700;color:var(--gold);margin-bottom:22px;padding-bottom:12px;border-bottom:1px solid var(--border);letter-spacing:.08em;display:flex;align-items:center;gap:8px;}
.login-error{display:none;background:#fdecea;border:1px solid #f5c6c2;border-radius:10px;padding:10px 13px;margin-bottom:14px;font-size:.82rem;color:var(--red);align-items:center;gap:8px;}
.login-error.show{display:flex;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:.7rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
.input-wrap{position:relative;}
.ico-left{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--gray);font-size:.85rem;pointer-events:none;}
.input-wrap input{width:100%;padding:12px 44px 12px 38px;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;color:var(--text);background:#fafbff;outline:none;transition:.2s;font-family:inherit;}
.input-wrap input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(139,105,20,0.10);}
.input-wrap input::placeholder{color:#c0c8da;}
.btn-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:#eef1f8;border:1.5px solid var(--border);border-radius:7px;width:30px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);font-size:.82rem;transition:.2s;}
.btn-eye:hover{background:var(--gold);color:#fff;border-color:var(--gold);}
.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;border:none;border-radius:10px;font-size:.92rem;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:.22s;box-shadow:0 4px 16px rgba(139,105,20,0.30);display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-login:hover{transform:translateY(-1px);}
.login-footer{margin-top:22px;text-align:center;}
.badges{display:flex;gap:14px;justify-content:center;margin-bottom:8px;}
.badge{font-size:.72rem;color:rgba(255,255,255,0.38);display:flex;align-items:center;gap:5px;}
.badge i{color:var(--gold2);}
.login-footer p{font-size:.68rem;color:rgba(255,255,255,0.22);}

/* ── LAYOUT DASHBOARD ── */
.dash-layout{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,var(--dark) 0%,var(--dark2) 100%);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:200;transition:.3s;}
.sidebar-header{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.08);}
.sidebar-logo{display:flex;align-items:center;gap:10px;}
.sidebar-logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.95rem;color:#fff;flex-shrink:0;}
.sidebar-logo-text .sl-title{font-size:.82rem;font-weight:800;color:#fff;letter-spacing:.06em;display:block;}
.sidebar-logo-text .sl-sub{font-size:.58rem;color:var(--gold2);letter-spacing:.14em;display:block;margin-top:1px;}
.sidebar-nav{flex:1;padding:16px 0;overflow-y:auto;}
.nav-section-label{font-size:.6rem;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:.12em;padding:12px 20px 6px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;cursor:pointer;transition:.18s;border-left:3px solid transparent;color:rgba(255,255,255,0.6);font-size:.83rem;font-weight:500;}
.nav-item:hover{background:rgba(255,255,255,0.06);color:#fff;border-left-color:var(--gold2);}
.nav-item.active{background:rgba(201,168,76,0.15);color:var(--gold2);border-left-color:var(--gold2);font-weight:700;}
.nav-item i{width:18px;text-align:center;font-size:.88rem;}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.08);}
.btn-logout{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);color:rgba(255,255,255,0.6);padding:10px;border-radius:9px;font-size:.8rem;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-logout:hover{background:rgba(255,255,255,0.12);color:#fff;}

/* TOPBAR */
.dash-content{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:#fff;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,0.07);position:sticky;top:0;z-index:100;}
.topbar-title{font-size:1rem;font-weight:700;color:var(--dark);}
.topbar-title span{color:var(--gold);font-size:.8rem;font-weight:500;margin-left:8px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.topbar-date{font-size:.75rem;color:var(--gray);}

/* PAGE ACCUEIL */
.dash-home{padding:28px;}
.welcome-banner{background:linear-gradient(135deg,var(--dark),var(--dark2));border-radius:16px;padding:28px 32px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;overflow:hidden;position:relative;}
.welcome-banner::before{content:'';position:absolute;top:-30px;right:-30px;width:180px;height:180px;border-radius:50%;background:rgba(201,168,76,0.08);}
.welcome-text h2{font-size:1.3rem;font-weight:800;color:#fff;margin-bottom:6px;}
.welcome-text p{font-size:.82rem;color:rgba(255,255,255,0.5);}
.welcome-icon{font-size:3rem;color:var(--gold2);opacity:.6;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px;}
.stat-card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 16px rgba(0,0,0,0.06);border-bottom:3px solid var(--gold2);}
.stat-card .stat-num{font-size:1.8rem;font-weight:800;color:var(--dark);}
.stat-card .stat-label{font-size:.72rem;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-top:4px;}
.stat-card .stat-icon{font-size:1.4rem;color:var(--gold2);margin-bottom:8px;}
.docs-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.doc-card{background:#fff;border-radius:14px;padding:22px;box-shadow:0 2px 16px rgba(0,0,0,0.06);cursor:pointer;transition:.22s;border-left:4px solid var(--gold2);display:flex;align-items:center;gap:16px;}
.doc-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,0.12);}
.doc-card-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.doc-card-icon.gold{background:var(--gold-light);color:var(--gold);}
.doc-card-icon.blue{background:#e8f4fd;color:var(--blue);}
.doc-card-icon.red{background:#fdecea;color:var(--red);}
.doc-card-icon.green{background:#eafaf1;color:var(--green);}
.doc-card-icon.purple{background:#f5eef8;color:#8e44ad;}
.doc-card-icon.orange{background:#fef9e7;color:#e67e22;}
.doc-card-info h4{font-size:.88rem;font-weight:700;color:var(--dark);}
.doc-card-info p{font-size:.73rem;color:var(--gray);margin-top:3px;}

/* FORMULAIRES */
.form-page{padding:28px;display:none;}
.form-page.active{display:block;}
.form-page-header{margin-bottom:24px;}
.form-page-header h2{font-size:1.1rem;font-weight:800;color:var(--dark);display:flex;align-items:center;gap:10px;}
.form-page-header h2 i{color:var(--gold2);}
.form-page-header p{font-size:.8rem;color:var(--gray);margin-top:4px;}
.form-card{background:#fff;border-radius:14px;padding:24px;margin-bottom:18px;box-shadow:0 2px 16px rgba(0,0,0,0.06);border-left:4px solid var(--gold2);}
.section-title{font-size:.72rem;font-weight:700;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--gold3);display:flex;align-items:center;gap:8px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-grid.col3{grid-template-columns:1fr 1fr 1fr;}
.form-grid.full{grid-template-columns:1fr;}
@media(max-width:700px){.form-grid,.form-grid.col3{grid-template-columns:1fr;} .stats-grid,.docs-grid{grid-template-columns:1fr;} .sidebar{transform:translateX(-100%);} .dash-content{margin-left:0;}}
.field-dash label{display:block;font-size:.68rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
.field-dash input,.field-dash select,.field-dash textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:.87rem;color:var(--text);background:#fafbff;outline:none;transition:.2s;font-family:inherit;}
.field-dash input:focus,.field-dash select:focus,.field-dash textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(139,105,20,0.08);}
.field-dash textarea{resize:vertical;min-height:85px;}

/* HÉRITIERS / BLOCS DYNAMIQUES */
.dynamic-block{background:#fafaf7;border:1.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;position:relative;}
.dynamic-block h4{font-size:.75rem;font-weight:700;color:var(--gold);margin-bottom:12px;text-transform:uppercase;letter-spacing:.06em;}
.btn-remove-block{position:absolute;top:12px;right:12px;background:#fdecea;border:none;color:var(--red);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;}
.btn-add-block{background:transparent;border:2px dashed var(--gold2);color:var(--gold);padding:10px 18px;border-radius:10px;font-size:.8rem;font-weight:600;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:8px;margin-top:8px;}
.btn-add-block:hover{background:var(--gold-light);}

/* SIGNATURE */
.signature-zone{border:2px dashed var(--gold2);border-radius:12px;overflow:hidden;background:#fffef9;}
.signature-canvas{display:block;width:100%;height:150px;cursor:crosshair;touch-action:none;}
.sig-actions{display:flex;gap:8px;padding:8px 12px;background:#fafaf5;border-top:1px solid var(--border);}
.btn-clear-sig{background:#fdecea;border:none;color:var(--red);padding:6px 12px;border-radius:7px;font-size:.75rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;}
.sig-label{font-size:.7rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}

/* BOUTONS ACTION */
.actions-bar{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;}
.btn-preview{flex:1;min-width:150px;padding:13px 18px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;border:none;border-radius:11px;font-size:.88rem;font-weight:700;cursor:pointer;transition:.22s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(139,105,20,0.25);}
.btn-preview:hover{transform:translateY(-1px);}
.btn-pdf{flex:1;min-width:150px;padding:13px 18px;background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;border:none;border-radius:11px;font-size:.88rem;font-weight:700;cursor:pointer;transition:.22s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(192,57,43,0.22);}
.btn-pdf:hover{transform:translateY(-1px);}

/* MODAL APERCU */
.modal-overlay{position:fixed;inset:0;background:rgba(10,10,20,0.78);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;padding:16px;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-doc{background:#fff;border-radius:16px;width:100%;max-width:740px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.35);transform:scale(.95);transition:transform .28s cubic-bezier(.32,1.2,.5,1);}
.modal-overlay.open .modal-doc{transform:scale(1);}
.modal-doc-header{background:linear-gradient(135deg,var(--dark),var(--dark2));padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-radius:16px 16px 0 0;position:sticky;top:0;}
.modal-doc-header h3{color:#fff;font-size:.88rem;font-weight:700;display:flex;align-items:center;gap:8px;}
.btn-close-modal{background:rgba(255,255,255,0.1);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;}

/* DOCUMENT RENDU */
.doc-content{padding:40px 48px;font-family:Georgia,serif;}
.doc-entete{text-align:center;border-bottom:3px double var(--gold2);padding-bottom:22px;margin-bottom:26px;}
.doc-entete .balance{font-size:2.4rem;color:var(--gold2);margin-bottom:8px;}
.doc-entete h1{font-size:1.1rem;font-weight:800;color:var(--dark);letter-spacing:.1em;text-transform:uppercase;}
.doc-entete p{font-size:.75rem;color:var(--gray);margin-top:3px;}
.doc-ref{text-align:right;font-size:.72rem;color:var(--gray);margin-bottom:22px;font-style:italic;}
.doc-titre{text-align:center;margin:22px 0;padding:13px;border:2px solid var(--gold2);border-radius:4px;}
.doc-titre h2{font-size:.95rem;font-weight:800;color:var(--dark);letter-spacing:.1em;text-transform:uppercase;}
.doc-section{margin-bottom:20px;}
.doc-section h3{font-size:.77rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--gold3);}
.doc-section p{font-size:.86rem;line-height:1.85;color:#333;text-align:justify;}
.doc-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.8rem;}
.doc-table th{background:var(--dark);color:#fff;padding:7px 10px;text-align:left;font-size:.7rem;letter-spacing:.05em;}
.doc-table td{padding:7px 10px;border-bottom:1px solid #eee;}
.doc-table tr:nth-child(even) td{background:#fafaf7;}
.doc-sig-zone{margin-top:34px;display:grid;grid-template-columns:1fr 1fr;gap:28px;}
.sig-box{text-align:center;}
.sig-box .sig-lbl{font-size:.72rem;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.sig-box img{max-width:100%;height:75px;object-fit:contain;border-bottom:1px solid #ccc;padding-bottom:4px;}
.sig-box .sig-nm{font-size:.76rem;font-weight:700;color:var(--dark);margin-top:6px;}
.doc-footer{margin-top:32px;padding-top:14px;border-top:2px solid var(--gold3);text-align:center;font-size:.68rem;color:var(--gray);font-style:italic;line-height:1.7;}

/* SPINNER / TOAST */
.spinner-overlay{position:fixed;inset:0;background:rgba(10,10,20,0.5);z-index:9998;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s;}
.spinner-overlay.show{opacity:1;pointer-events:all;}
.spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,0.2);border-top-color:var(--gold2);border-radius:50%;animation:spin .7s linear infinite;}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--dark);color:#fff;padding:11px 22px;border-radius:28px;font-size:.82rem;font-weight:500;z-index:9999;transition:transform .3s cubic-bezier(.32,1.2,.5,1);white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,0.25);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--gold);}
.toast.error{background:var(--red);}
.toast.info{background:var(--blue);}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* IMPORT SIGNATURE */
.btn-import-sig{background:#e8f4fd;border:none;color:#2980b9;padding:6px 12px;border-radius:7px;font-size:.75rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.btn-import-sig:hover{background:#2980b9;color:#fff;}

/* SUGGESTIONS */
.suggestions-box{margin-top:8px;padding:10px 12px;background:linear-gradient(135deg,#faf5e4,#fff8e8);border:1.5px solid var(--gold3);border-radius:10px;}
.sug-label{font-size:.68rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.sug-btn{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--gold3);color:var(--text);padding:7px 11px;border-radius:8px;font-size:.79rem;cursor:pointer;transition:.18s;margin-bottom:5px;line-height:1.4;}
.sug-btn:last-child{margin-bottom:0;}
.sug-btn:hover{background:var(--gold-light);border-color:var(--gold2);color:var(--gold);}
.sug-btn.active{background:var(--gold-light);border-color:var(--gold);color:var(--gold);font-weight:600;}
</style>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="login-body">
<div class="login-page">
    <div class="login-header">
        <div class="notaire-logo">
            <div class="logo-icon"><i class="fas fa-balance-scale"></i></div>
            <div class="logo-text">
                <span class="logo-title">Mé DUPONT & ASSOCIÉS</span>
                <span class="logo-sub">NOTAIRES ASSOCIÉS — PARIS</span>
            </div>
        </div>
        <p class="login-tagline">Espace sécurisé · Actes authentiques · Officiel</p>
    </div>
    <div class="login-card">
        <h2 class="login-card-title"><i class="fas fa-lock"></i> ACCÈS RÉSERVÉ</h2>
        <div class="login-error" id="login-error">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="error-msg">Identifiant ou mot de passe incorrect.</span>
        </div>
        <form onsubmit="doLogin(event)">
            <div class="field">
                <label>Identifiant</label>
                <div class="input-wrap">
                    <i class="fas fa-user ico-left"></i>
                    <input type="text" id="u" placeholder="Votre identifiant" required>
                </div>
            </div>
            <div class="field">
                <label>Mot de passe</label>
                <div class="input-wrap">
                    <i class="fas fa-key ico-left"></i>
                    <input type="password" id="p" placeholder="••••••••" required>
                    <button type="button" class="btn-eye" onclick="togglePass()"><i class="fas fa-eye" id="eye-icon"></i></button>
                </div>
            </div>
            <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> SE CONNECTER</button>
        </form>
    </div>
    <div class="login-footer">
        <div class="badges">
            <span class="badge"><i class="fas fa-shield-alt"></i> SSL 256-bit</span>
            <span class="badge"><i class="fas fa-gavel"></i> Actes officiels</span>
            <span class="badge"><i class="fas fa-lock"></i> Chiffré</span>
        </div>
        <p>© 2024 Étude Notariale Dupont & Associés — Accès strictement réservé au personnel habilité</p>
    </div>
</div>
<div class="spinner-overlay" id="spinner"><div class="spinner"></div></div>
<script>
function doLogin(e) {
    e.preventDefault();
    var u = document.getElementById('u').value.trim();
    var p = document.getElementById('p').value;
    document.getElementById('login-error').classList.remove('show');
    document.getElementById('spinner').classList.add('show');
    setTimeout(function() {
        if (u === 'DjanIsFake' && p === '44454241') {
            window.location.href = 'dashboard.html';
        } else {
            document.getElementById('spinner').classList.remove('show');
            document.getElementById('login-error').classList.add('show');
            document.getElementById('p').value = '';
        }
    }, 900);
}
function togglePass() {
    var i = document.getElementById('p'), ic = document.getElementById('eye-icon');
    i.type = i.type === 'password' ? 'text' : 'password';
    ic.className = i.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}
</script>
