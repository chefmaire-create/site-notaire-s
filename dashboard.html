<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acte de Testament — Étude Dupont & Associés</title>
    <link rel="stylesheet" href="notaire_style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<!-- HEADER -->
<header class="dash-header">
    <div class="header-logo">
        <div class="header-logo-icon"><i class="fas fa-balance-scale"></i></div>
        <div class="header-logo-text">
            <span class="header-logo-title">Mé DUPONT & ASSOCIÉS</span>
            <span class="header-logo-sub">NOTAIRES ASSOCIÉS — PARIS</span>
        </div>
    </div>
    <button class="btn-logout" onclick="window.location.href='notaire_index.html'">
        <i class="fas fa-sign-out-alt"></i> Déconnexion
    </button>
</header>

<!-- MAIN -->
<div class="dash-main">

    <!-- TESTATEUR -->
    <div class="form-card">
        <div class="section-title"><i class="fas fa-user"></i> Informations du Testateur</div>
        <div class="form-grid">
            <div class="field-dash"><label>Nom</label><input type="text" id="t-nom" placeholder="Nom de famille"></div>
            <div class="field-dash"><label>Prénom</label><input type="text" id="t-prenom" placeholder="Prénom(s)"></div>
            <div class="field-dash"><label>Date de naissance</label><input type="date" id="t-dob"></div>
            <div class="field-dash"><label>Lieu de naissance</label><input type="text" id="t-lieu-naissance" placeholder="Ville, Département"></div>
            <div class="field-dash"><label>Nationalité</label><input type="text" id="t-nationalite" placeholder="Ex: Française" value="Française"></div>
            <div class="field-dash"><label>Situation matrimoniale</label>
                <select id="t-situation">
                    <option>Célibataire</option>
                    <option>Marié(e)</option>
                    <option>Divorcé(e)</option>
                    <option>Veuf(ve)</option>
                    <option>Pacsé(e)</option>
                </select>
            </div>
            <div class="field-dash form-grid full"><label>Adresse complète</label><input type="text" id="t-adresse" placeholder="Numéro, Rue, Code postal, Ville"></div>
        </div>
    </div>

    <!-- PATRIMOINE -->
    <div class="form-card">
        <div class="section-title"><i class="fas fa-home"></i> Description du Patrimoine</div>
        <div class="form-grid">
            <div class="field-dash"><label>Valeur estimée du patrimoine (€)</label><input type="number" id="p-valeur" placeholder="Ex: 500000"></div>
            <div class="field-dash"><label>Dont biens immobiliers (€)</label><input type="number" id="p-immo" placeholder="Ex: 350000"></div>
        </div>
        <div class="form-grid full" style="margin-top:14px;">
            <div class="field-dash"><label>Description des biens principaux</label>
                <textarea id="p-description" placeholder="Ex: Appartement situé au 12 rue de la Paix, Paris 75001 — Véhicules — Comptes bancaires — Portefeuille actions..."></textarea>
            </div>
        </div>
    </div>

    <!-- HÉRITIERS -->
    <div class="form-card">
        <div class="section-title"><i class="fas fa-users"></i> Héritiers & Légataires</div>
        <div id="heritiers-container"></div>
        <button class="btn-add-heritier" onclick="ajouterHeritier()">
            <i class="fas fa-plus-circle"></i> Ajouter un héritier
        </button>
    </div>

    <!-- VOLONTÉS -->
    <div class="form-card">
        <div class="section-title"><i class="fas fa-scroll"></i> Volontés & Dispositions</div>
        <div class="form-grid full">
            <div class="field-dash"><label>Dispositions particulières</label>
                <textarea id="v-dispositions" rows="4" placeholder="Ex: Je lègue mon appartement parisien à ma fille ainée. Je souhaite que mes bijoux soient partagés équitablement entre mes enfants..."></textarea>
            </div>
            <div class="field-dash" style="margin-top:14px;"><label>Exécuteur testamentaire</label>
                <input type="text" id="v-executeur" placeholder="Nom et prénom de l'exécuteur testamentaire">
            </div>
        </div>
    </div>

    <!-- NOTAIRE -->
    <div class="form-card">
        <div class="section-title"><i class="fas fa-gavel"></i> Informations du Notaire</div>
        <div class="form-grid">
            <div class="field-dash"><label>Nom du notaire</label><input type="text" id="n-nom" value="Mé Jean-Pierre DUPONT" placeholder="Nom du notaire"></div>
            <div class="field-dash"><label>Numéro CRPCEN</label><input type="text" id="n-crpcen" value="75042" placeholder="Ex: 75042"></div>
            <div class="field-dash"><label>Étude notariale</label><input type="text" id="n-etude" value="Mé DUPONT & ASSOCIÉS" placeholder="Nom de l'étude"></div>
            <div class="field-dash"><label>Adresse de l'étude</label><input type="text" id="n-adresse" value="14 Place Vendôme, 75001 Paris" placeholder="Adresse"></div>
            <div class="field-dash"><label>Téléphone</label><input type="text" id="n-tel" value="+33 1 42 60 00 00" placeholder="Téléphone"></div>
            <div class="field-dash"><label>Date de l'acte</label><input type="date" id="n-date"></div>
        </div>
    </div>

    <!-- SIGNATURES -->
    <div class="form-card">
        <div class="section-title"><i class="fas fa-pen-nib"></i> Signatures Électroniques</div>
        <div class="form-grid">
            <div>
                <p style="font-size:.75rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">Signature du Testateur</p>
                <div class="signature-zone">
                    <canvas class="signature-canvas" id="canvas-testateur"></canvas>
                    <div class="signature-actions">
                        <button class="btn-clear-sig" onclick="clearCanvas('canvas-testateur')"><i class="fas fa-eraser"></i> Effacer</button>
                    </div>
                </div>
            </div>
            <div>
                <p style="font-size:.75rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">Signature du Notaire</p>
                <div class="signature-zone">
                    <canvas class="signature-canvas" id="canvas-notaire"></canvas>
                    <div class="signature-actions">
                        <button class="btn-clear-sig" onclick="clearCanvas('canvas-notaire')"><i class="fas fa-eraser"></i> Effacer</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ACTIONS -->
    <div class="actions-bar">
        <button class="btn-preview" onclick="previsualiser()"><i class="fas fa-eye"></i> PRÉVISUALISER L'ACTE</button>
        <button class="btn-pdf" onclick="genererPDF()"><i class="fas fa-file-pdf"></i> TÉLÉCHARGER EN PDF</button>
    </div>

</div>

<!-- MODAL PREVIEW -->
<div class="modal-overlay" id="preview-modal">
    <div class="modal-doc">
        <div class="modal-doc-header">
            <h3><i class="fas fa-file-alt" style="margin-right:8px;"></i>Prévisualisation — Acte de Testament</h3>
            <button class="btn-close-modal" onclick="closeModal()">&times;</button>
        </div>
        <div class="doc-content" id="doc-preview"></div>
    </div>
</div>

<div class="spinner-overlay" id="spinner"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════
// HÉRITIERS
// ══════════════════════════════════════
var heritierCount = 0;

function ajouterHeritier() {
    heritierCount++;
    var n = heritierCount;
    var div = document.createElement('div');
    div.className = 'heritier-block';
    div.id = 'heritier-' + n;
    div.innerHTML =
        '<h4>Héritier / Légataire #' + n + '</h4>' +
        '<button class="btn-remove" onclick="supprimerHeritier(' + n + ')"><i class="fas fa-times"></i></button>' +
        '<div class="form-grid">' +
        '<div class="field-dash"><label>Nom & Prénom</label><input type="text" id="h-nom-' + n + '" placeholder="Nom complet"></div>' +
        '<div class="field-dash"><label>Lien de parenté</label><input type="text" id="h-lien-' + n + '" placeholder="Ex: Fils, Fille, Époux..."></div>' +
        '<div class="field-dash"><label>Quote-part (%)</label><input type="number" id="h-part-' + n + '" placeholder="Ex: 50" min="0" max="100"></div>' +
        '<div class="field-dash"><label>Nature du legs</label>' +
        '<select id="h-nature-' + n + '"><option>Legs universel</option><option>Legs à titre universel</option><option>Legs particulier</option></select>' +
        '</div></div>';
    document.getElementById('heritiers-container').appendChild(div);
}

function supprimerHeritier(n) {
    var el = document.getElementById('heritier-' + n);
    if (el) el.remove();
}

// ══════════════════════════════════════
// SIGNATURES
// ══════════════════════════════════════
var canvases = {};
var drawing = {};

function initCanvas(id) {
    var canvas = document.getElementById(id);
    var rect = canvas.getBoundingClientRect();
    canvas.width = canvas.offsetWidth * window.devicePixelRatio;
    canvas.height = canvas.offsetHeight * window.devicePixelRatio;
    var ctx = canvas.getContext('2d');
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    canvases[id] = ctx;
    drawing[id] = false;

    canvas.addEventListener('mousedown', function(e) { startDraw(id, e.clientX, e.clientY); });
    canvas.addEventListener('mousemove', function(e) { if(drawing[id]) draw(id, e.clientX, e.clientY); });
    canvas.addEventListener('mouseup', function() { drawing[id] = false; });
    canvas.addEventListener('mouseleave', function() { drawing[id] = false; });
    canvas.addEventListener('touchstart', function(e) { e.preventDefault(); var t = e.touches[0]; startDraw(id, t.clientX, t.clientY); }, {passive:false});
    canvas.addEventListener('touchmove', function(e) { e.preventDefault(); if(drawing[id]){ var t = e.touches[0]; draw(id, t.clientX, t.clientY); } }, {passive:false});
    canvas.addEventListener('touchend', function() { drawing[id] = false; });
}

function getPos(id, clientX, clientY) {
    var canvas = document.getElementById(id);
    var rect = canvas.getBoundingClientRect();
    return { x: clientX - rect.left, y: clientY - rect.top };
}

function startDraw(id, cx, cy) {
    drawing[id] = true;
    var pos = getPos(id, cx, cy);
    canvases[id].beginPath();
    canvases[id].moveTo(pos.x, pos.y);
}

function draw(id, cx, cy) {
    var pos = getPos(id, cx, cy);
    canvases[id].lineTo(pos.x, pos.y);
    canvases[id].stroke();
}

function clearCanvas(id) {
    var canvas = document.getElementById(id);
    canvases[id].clearRect(0, 0, canvas.width, canvas.height);
}

function isCanvasEmpty(id) {
    var canvas = document.getElementById(id);
    var ctx = canvas.getContext('2d');
    var data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    for (var i = 3; i < data.length; i += 4) { if (data[i] > 0) return false; }
    return true;
}

// ══════════════════════════════════════
// COLLECTE DES DONNÉES
// ══════════════════════════════════════
function getData() {
    var heritiers = [];
    document.querySelectorAll('.heritier-block').forEach(function(block) {
        var id = block.id.split('-')[1];
        var nom   = document.getElementById('h-nom-' + id);
        var lien  = document.getElementById('h-lien-' + id);
        var part  = document.getElementById('h-part-' + id);
        var nat   = document.getElementById('h-nature-' + id);
        if (nom) heritiers.push({
            nom: nom.value || '—',
            lien: lien ? lien.value || '—' : '—',
            part: part ? part.value || '—' : '—',
            nature: nat ? nat.value : '—'
        });
    });

    return {
        testateur: {
            nom: document.getElementById('t-nom').value || '—',
            prenom: document.getElementById('t-prenom').value || '—',
            dob: document.getElementById('t-dob').value || '—',
            lieuNaissance: document.getElementById('t-lieu-naissance').value || '—',
            nationalite: document.getElementById('t-nationalite').value || '—',
            situation: document.getElementById('t-situation').value,
            adresse: document.getElementById('t-adresse').value || '—'
        },
        patrimoine: {
            valeur: document.getElementById('p-valeur').value || '—',
            immo: document.getElementById('p-immo').value || '—',
            description: document.getElementById('p-description').value || '—'
        },
        heritiers: heritiers,
        volontes: {
            dispositions: document.getElementById('v-dispositions').value || '—',
            executeur: document.getElementById('v-executeur').value || '—'
        },
        notaire: {
            nom: document.getElementById('n-nom').value || '—',
            crpcen: document.getElementById('n-crpcen').value || '—',
            etude: document.getElementById('n-etude').value || '—',
            adresse: document.getElementById('n-adresse').value || '—',
            tel: document.getElementById('n-tel').value || '—',
            date: document.getElementById('n-date').value || '—'
        }
    };
}

function fmtDate(d) {
    if (!d || d === '—') return '—';
    var parts = d.split('-');
    if (parts.length !== 3) return d;
    return parts[2] + '/' + parts[1] + '/' + parts[0];
}

function fmtMontant(n) {
    if (!n || n === '—') return '—';
    return Number(n).toLocaleString('fr-FR') + ' €';
}

function genRef() {
    return 'ACTE-' + new Date().getFullYear() + '-' + Math.random().toString(36).slice(2,8).toUpperCase();
}

// ══════════════════════════════════════
// GÉNÉRATION HTML DOCUMENT
// ══════════════════════════════════════
function genDocHTML(d, ref, sigTestateur, sigNotaire) {
    var heritieursHTML = '';
    if (d.heritiers.length > 0) {
        heritieursHTML = '<table class="doc-heritiers-table"><thead><tr><th>Nom & Prénom</th><th>Lien</th><th>Quote-part</th><th>Nature</th></tr></thead><tbody>';
        d.heritiers.forEach(function(h) {
            heritieursHTML += '<tr><td><strong>' + h.nom + '</strong></td><td>' + h.lien + '</td><td>' + (h.part !== '—' ? h.part + '%' : '—') + '</td><td>' + h.nature + '</td></tr>';
        });
        heritieursHTML += '</tbody></table>';
    } else {
        heritieursHTML = '<p><em>Aucun héritier renseigné.</em></p>';
    }

    var sigTHTML = sigTestateur ? '<img src="' + sigTestateur + '" alt="Signature testateur">' : '<div style="height:80px;border-bottom:1px solid #ccc;"></div>';
    var sigNHTML = sigNotaire  ? '<img src="' + sigNotaire  + '" alt="Signature notaire">'   : '<div style="height:80px;border-bottom:1px solid #ccc;"></div>';

    return '<div class="doc-entete">' +
        '<div class="balance"><i class="fas fa-balance-scale"></i></div>' +
        '<h1>' + d.notaire.etude + '</h1>' +
        '<p>Notaires Associés — ' + d.notaire.adresse + '</p>' +
        '<p style="margin-top:4px;font-size:.73rem;">Tél. ' + d.notaire.tel + ' · CRPCEN ' + d.notaire.crpcen + '</p>' +
    '</div>' +
    '<div class="doc-ref">Référence : <strong>' + ref + '</strong> &nbsp;|&nbsp; Date de l\'acte : <strong>' + fmtDate(d.notaire.date) + '</strong></div>' +
    '<div class="doc-titre"><h2>Acte Authentique de Testament Olographe</h2></div>' +

    '<div class="doc-section"><h3>Article 1 — Identité du Testateur</h3>' +
    '<p>Par devant <strong>' + d.notaire.nom + '</strong>, Notaire soussigné, titulaire de l\'Office Notarial immatriculé sous le numéro CRPCEN <strong>' + d.notaire.crpcen + '</strong>, a comparu :</p>' +
    '<p style="margin-top:10px;"><strong>' + d.testateur.prenom + ' ' + d.testateur.nom + '</strong>, né(e) le <strong>' + fmtDate(d.testateur.dob) + '</strong> à <strong>' + d.testateur.lieuNaissance + '</strong>, de nationalité <strong>' + d.testateur.nationalite + '</strong>, ' + d.testateur.situation + ', demeurant <strong>' + d.testateur.adresse + '</strong>.</p>' +
    '<p style="margin-top:8px;">Le testateur déclare être sain d\'esprit et agir librement et en connaissance de cause, conformément aux dispositions des articles 902 et suivants du Code civil.</p>' +
    '</div>' +

    '<div class="doc-section"><h3>Article 2 — Description du Patrimoine</h3>' +
    '<p>Le testateur déclare posséder un patrimoine d\'une valeur estimée à <strong>' + fmtMontant(d.patrimoine.valeur) + '</strong>, dont <strong>' + fmtMontant(d.patrimoine.immo) + '</strong> en biens immobiliers.</p>' +
    '<p style="margin-top:8px;"><strong>Composition :</strong> ' + d.patrimoine.description + '</p>' +
    '</div>' +

    '<div class="doc-section"><h3>Article 3 — Désignation des Héritiers et Légataires</h3>' +
    '<p>Le testateur désigne les héritiers et légataires suivants :</p>' +
    heritieursHTML +
    '</div>' +

    '<div class="doc-section"><h3>Article 4 — Dispositions et Volontés</h3>' +
    '<p>' + d.volontes.dispositions + '</p>' +
    (d.volontes.executeur !== '—' ? '<p style="margin-top:10px;">Le testateur désigne comme exécuteur testamentaire : <strong>' + d.volontes.executeur + '</strong>.</p>' : '') +
    '</div>' +

    '<div class="doc-section"><h3>Article 5 — Déclarations Finales</h3>' +
    '<p>Le présent acte a été dressé et lu au testateur, qui y a adhéré et l\'a approuvé. Il est établi conformément aux articles 969 à 980 du Code civil français relatifs au testament olographe authentique. Toute modification ultérieure devra faire l\'objet d\'un codicille rédigé dans les mêmes formes.</p>' +
    '</div>' +

    '<div class="doc-signature-zone">' +
    '<div class="sig-box"><p>Signature du Testateur</p>' + sigTHTML + '<div class="sig-name">' + d.testateur.prenom + ' ' + d.testateur.nom + '</div></div>' +
    '<div class="sig-box"><p>Signature & Sceau du Notaire</p>' + sigNHTML + '<div class="sig-name">' + d.notaire.nom + '</div></div>' +
    '</div>' +

    '<div class="doc-footer">' +
    'Acte dressé et signé le ' + fmtDate(d.notaire.date) + ' — ' + d.notaire.etude + ' — ' + d.notaire.adresse + '<br>' +
    'Enregistré sous la référence : ' + ref + ' — Document officiel soumis au secret professionnel notarial' +
    '</div>';
}

// ══════════════════════════════════════
// PRÉVISUALISATION
// ══════════════════════════════════════
function previsualiser() {
    var d = getData();
    var ref = genRef();
    var sigT = isCanvasEmpty('canvas-testateur') ? null : document.getElementById('canvas-testateur').toDataURL();
    var sigN = isCanvasEmpty('canvas-notaire')   ? null : document.getElementById('canvas-notaire').toDataURL();
    document.getElementById('doc-preview').innerHTML = genDocHTML(d, ref, sigT, sigN);
    document.getElementById('preview-modal').classList.add('open');
}

function closeModal() {
    document.getElementById('preview-modal').classList.remove('open');
}

// ══════════════════════════════════════
// GÉNÉRATION PDF
// ══════════════════════════════════════
function genererPDF() {
    var d = getData();
    var ref = genRef();
    showSpinner(true);

    setTimeout(function() {
        try {
            var jsPDF = window.jspdf.jsPDF;
            var doc = new jsPDF({ unit: 'mm', format: 'a4' });
            var pageW = doc.internal.pageSize.getWidth();
            var margin = 20;
            var maxW = pageW - margin * 2;
            var y = 20;

            function checkPage(needed) {
                if (y + needed > 270) { doc.addPage(); y = 20; }
            }

            // EN-TÊTE
            doc.setFillColor(26, 26, 46);
            doc.rect(0, 0, pageW, 40, 'F');
            doc.setTextColor(201, 168, 76);
            doc.setFontSize(14);
            doc.setFont('helvetica', 'bold');
            doc.text('Mé DUPONT & ASSOCIÉS — NOTAIRES ASSOCIÉS', pageW / 2, 16, { align: 'center' });
            doc.setFontSize(8);
            doc.setTextColor(180, 180, 180);
            doc.text(d.notaire.adresse + ' · Tél. ' + d.notaire.tel, pageW / 2, 24, { align: 'center' });
            doc.text('CRPCEN : ' + d.notaire.crpcen, pageW / 2, 30, { align: 'center' });

            // TITRE
            y = 52;
            doc.setTextColor(26, 26, 46);
            doc.setFontSize(13);
            doc.setFont('helvetica', 'bold');
            doc.text('ACTE AUTHENTIQUE DE TESTAMENT OLOGRAPHE', pageW / 2, y, { align: 'center' });
            y += 6;
            doc.setDrawColor(201, 168, 76);
            doc.setLineWidth(0.8);
            doc.line(margin, y, pageW - margin, y);
            y += 6;
            doc.setFontSize(8);
            doc.setTextColor(120, 120, 120);
            doc.setFont('helvetica', 'italic');
            doc.text('Référence : ' + ref + '   |   Date : ' + fmtDate(d.notaire.date), pageW / 2, y, { align: 'center' });
            y += 12;

            function sectionTitle(title) {
                checkPage(14);
                doc.setFillColor(240, 208, 128);
                doc.rect(margin, y - 4, maxW, 8, 'F');
                doc.setFontSize(8);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(26, 26, 46);
                doc.text(title, margin + 3, y + 1);
                y += 10;
            }

            function bodyText(text) {
                doc.setFontSize(9);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(50, 50, 50);
                var lines = doc.splitTextToSize(text, maxW);
                checkPage(lines.length * 5 + 4);
                doc.text(lines, margin, y);
                y += lines.length * 5 + 4;
            }

            // ART 1
            sectionTitle('Article 1 — Identité du Testateur');
            bodyText('Par devant ' + d.notaire.nom + ', Notaire soussigné (CRPCEN ' + d.notaire.crpcen + '), a comparu :');
            bodyText(d.testateur.prenom + ' ' + d.testateur.nom + ', né(e) le ' + fmtDate(d.testateur.dob) + ' à ' + d.testateur.lieuNaissance + ', de nationalité ' + d.testateur.nationalite + ', ' + d.testateur.situation + ', demeurant ' + d.testateur.adresse + '.');
            bodyText('Le testateur déclare être sain d\'esprit et agir librement, conformément aux articles 902 et suivants du Code civil.');

            // ART 2
            sectionTitle('Article 2 — Description du Patrimoine');
            bodyText('Valeur totale estimée : ' + fmtMontant(d.patrimoine.valeur) + ' dont ' + fmtMontant(d.patrimoine.immo) + ' en biens immobiliers.');
            bodyText('Composition : ' + d.patrimoine.description);

            // ART 3 — HÉRITIERS
            sectionTitle('Article 3 — Désignation des Héritiers et Légataires');
            if (d.heritiers.length > 0) {
                var colW = [70, 35, 25, 55];
                var headers = ['Nom & Prénom', 'Lien', 'Quote-part', 'Nature'];
                doc.setFillColor(26, 26, 46);
                doc.rect(margin, y, maxW, 7, 'F');
                doc.setFontSize(7.5);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(255, 255, 255);
                var cx = margin + 2;
                headers.forEach(function(h, i) { doc.text(h, cx, y + 5); cx += colW[i]; });
                y += 7;
                d.heritiers.forEach(function(h, idx) {
                    checkPage(8);
                    if (idx % 2 === 0) { doc.setFillColor(250, 250, 247); doc.rect(margin, y, maxW, 7, 'F'); }
                    doc.setFontSize(8);
                    doc.setFont('helvetica', 'normal');
                    doc.setTextColor(50, 50, 50);
                    cx = margin + 2;
                    [h.nom, h.lien, h.part !== '—' ? h.part + '%' : '—', h.nature].forEach(function(v, i) {
                        doc.text(String(v).slice(0, 30), cx, y + 5);
                        cx += colW[i];
                    });
                    y += 7;
                });
                y += 4;
            } else {
                bodyText('Aucun héritier renseigné.');
            }

            // ART 4
            sectionTitle('Article 4 — Dispositions & Volontés');
            bodyText(d.volontes.dispositions);
            if (d.volontes.executeur !== '—') bodyText('Exécuteur testamentaire désigné : ' + d.volontes.executeur);

            // ART 5
            sectionTitle('Article 5 — Déclarations Finales');
            bodyText('Le présent acte a été dressé et lu au testateur, qui y a adhéré et l\'a approuvé. Il est établi conformément aux articles 969 à 980 du Code civil français. Toute modification devra faire l\'objet d\'un codicille dressé dans les mêmes formes.');

            // SIGNATURES
            checkPage(60);
            y += 8;
            doc.setDrawColor(201, 168, 76);
            doc.setLineWidth(0.5);
            doc.line(margin, y, pageW - margin, y);
            y += 8;

            var sigT = isCanvasEmpty('canvas-testateur') ? null : document.getElementById('canvas-testateur').toDataURL('image/png');
            var sigN = isCanvasEmpty('canvas-notaire')   ? null : document.getElementById('canvas-notaire').toDataURL('image/png');
            var midX = pageW / 2;

            doc.setFontSize(8);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(100, 100, 100);
            doc.text('Signature du Testateur', margin + 20, y);
            doc.text('Signature du Notaire', midX + 15, y);
            y += 4;

            if (sigT) { try { doc.addImage(sigT, 'PNG', margin, y, 70, 30); } catch(e) {} }
            else { doc.setDrawColor(180,180,180); doc.line(margin, y+30, margin+70, y+30); }

            if (sigN) { try { doc.addImage(sigN, 'PNG', midX + 5, y, 70, 30); } catch(e) {} }
            else { doc.setDrawColor(180,180,180); doc.line(midX + 5, y+30, midX + 75, y+30); }

            y += 34;
            doc.setFontSize(8);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(26, 26, 46);
            doc.text(d.testateur.prenom + ' ' + d.testateur.nom, margin + 10, y);
            doc.text(d.notaire.nom, midX + 15, y);

            // PIED DE PAGE
            var totalPages = doc.internal.getNumberOfPages();
            for (var i = 1; i <= totalPages; i++) {
                doc.setPage(i);
                doc.setFontSize(7);
                doc.setTextColor(150, 150, 150);
                doc.setFont('helvetica', 'italic');
                doc.text('Réf. ' + ref + ' — ' + d.notaire.etude + ' — Document officiel soumis au secret professionnel notarial — Page ' + i + '/' + totalPages, pageW / 2, 290, { align: 'center' });
            }

            var nomFichier = 'Testament_' + d.testateur.nom + '_' + ref + '.pdf';
            doc.save(nomFichier);
            showToast('PDF généré avec succès !', 'success');
        } catch(err) {
            console.error(err);
            showToast('Erreur lors de la génération du PDF.', 'error');
        }
        showSpinner(false);
    }, 500);
}

// ══════════════════════════════════════
// UTILITAIRES
// ══════════════════════════════════════
function showSpinner(v) {
    document.getElementById('spinner').classList.toggle('show', v);
}
function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (type || 'success');
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(function() { t.classList.remove('show'); }, 3500);
}

// INIT
window.addEventListener('load', function() {
    // Date du jour par défaut
    var today = new Date().toISOString().split('T')[0];
    document.getElementById('n-date').value = today;
    // Init canvases
    initCanvas('canvas-testateur');
    initCanvas('canvas-notaire');
    // 1 héritier par défaut
    ajouterHeritier();
    // Fermer modal sur fond
    document.getElementById('preview-modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
});
</script>
